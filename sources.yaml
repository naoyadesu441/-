# ============================================================================
# ソース定義 — すべて API キー不要の無料ソース。
#   tier:   primary   = 一次ソース（公式ブログ・公式発表・論文）
#           secondary = 二次ソース（信頼メディア報道）
#           social    = 社会系（SNS/掲示板。噂は裏取り対象）
#   weight: 事前ランクの重み（0.0〜2.0 目安）。AIに無関係なチャンネルは下げる。
#   enabled: false にすると収集対象から外れる（RSS不安定なものは検証後に切替）。
# 値や URL は scripts/verify_youtube.py / verify_feeds.py で実際に検証してから本番化する。
# ============================================================================

# 直近この時間内（時）に公開されたものだけを対象にする。
# 一次を10件以上確保するため余裕をもって30h（cron遅延吸収+公式ブログの更新頻度吸収）。
window_hours: 30

# 事前ランクで AI 関連と判定するためのキーワード（小文字で部分一致）。
ai_keywords:
  - ai
  - artificial intelligence
  - llm
  - gpt
  - chatgpt
  - openai
  - anthropic
  - claude
  - gemini
  - deepmind
  - llama
  - mistral
  - agent
  - rag
  - diffusion
  - transformer
  - machine learning
  - neural
  - generative
  - 生成ai
  - 人工知能
  - chatbot
  - automation
  - no-code
  - prompt
  - image generation
  - content creation
  - productivity
  - copilot
  - 副業
  - マーケ

