# ---------------------------------------------------------------------------
# Reddit（top.json?t=day。記述的 User-Agent 必須）
# ---------------------------------------------------------------------------
reddit:
  subreddits:
    - ChatGPT
    - OpenAI
    - ClaudeAI
    - singularity
    - LocalLLaMA
    - MachineLearning
    - artificial
    - StableDiffusion
  limit: 50
  tier: social
  weight: 0.9
  min_score: 30

# ---------------------------------------------------------------------------
# Hacker News（Algolia API。キー不要）
# ---------------------------------------------------------------------------
hackernews:
  query: AI
  tags:
    - story
    - show_hn
  hits_per_page: 60
  tier: social
  weight: 1.0
  min_points: 30
  require_ai: true   # タイトルにAIキーワード必須（SpaceX等の無関係記事を排除）

# ---------------------------------------------------------------------------
# Product Hunt（RSS。AI関連のみ抽出）
# ---------------------------------------------------------------------------
producthunt:
  url: https://www.producthunt.com/feed
  tier: secondary
  weight: 0.7
  enabled: true

# ---------------------------------------------------------------------------
# arXiv（API。論文。新規性はあるが重み下げ）
# ---------------------------------------------------------------------------
arxiv:
  query: "cat:cs.AI OR cat:cs.LG OR cat:cs.CL"
  max_results: 80
  tier: primary
  weight: 0.9
  enabled: true

